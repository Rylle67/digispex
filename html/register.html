<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg);
    }

    .auth-page-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .auth-page-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .auth-page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 2.5px;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .auth-page-sub {
      font-size: 0.82rem;
      color: var(--text3);
      margin-bottom: 1.75rem;
    }

    .auth-page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--text3);
    }

    .auth-page-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .auth-page-footer a:hover { opacity: 0.8; }

    .auth-back-link {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text3);
    }
    .auth-back-link a {
      color: var(--text2);
      text-decoration: none;
    }
    .auth-back-link a:hover { color: var(--accent); }
  </style>
</head>
<body>

<script src="../javascript/theme.js"></script>

<div class="auth-page">

  <a class="auth-page-logo" href="index.html">DigiSpecs</a>

  <div class="auth-page-card">
    <div class="auth-page-title">Create Account</div>
    <div class="auth-page-sub">Join DigiSpecs and start building your dream PC</div>

    <form id="registerForm" onsubmit="handleRegister(event)" novalidate>

      <div class="auth-form-group">
        <label class="auth-label">Full Name</label>
        <input class="form-input" id="regName" type="text"
               placeholder="Juan dela Cruz" autocomplete="name">
        <span class="auth-error" id="reg-err-name"></span>
      </div>

      <div class="auth-form-group">
        <label class="auth-label">Email Address</label>
        <input class="form-input" id="regEmail" type="email"
               placeholder="you@example.com" autocomplete="email">
        <span class="auth-error" id="reg-err-email"></span>
      </div>

      <div class="auth-form-group">
        <label class="auth-label">
          Password <span class="auth-hint">(min. 6 characters)</span>
        </label>
        <div class="auth-input-wrap">
          <input class="form-input" id="regPassword" type="password"
                 placeholder="Create a password" autocomplete="new-password">
          <button type="button" class="auth-eye-btn"
                  onclick="togglePasswordVis('regPassword', this)">&#128065;</button>
        </div>
        <span class="auth-error" id="reg-err-password"></span>
      </div>

      <div class="auth-form-group">
        <label class="auth-label">Confirm Password</label>
        <div class="auth-input-wrap">
          <input class="form-input" id="regConfirm" type="password"
                 placeholder="Repeat your password" autocomplete="new-password">
          <button type="button" class="auth-eye-btn"
                  onclick="togglePasswordVis('regConfirm', this)">&#128065;</button>
        </div>
        <span class="auth-error" id="reg-err-confirm"></span>
      </div>

      <button type="submit" class="btn-primary auth-submit-btn">Create Account</button>
    </form>

    <div class="auth-page-footer">
      Already have an account?
      <a href="login.html">Sign in</a>
    </div>

    <div class="auth-back-link">
      <a href="index.html">&larr; Back to store</a>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ── Storage keys (must match auth-modal.js) ── */
const AUTH_USERS_KEY   = 'ds_auth_users';
const AUTH_SESSION_KEY = 'ds_auth_session';

function _authRead(key)       { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function _authWrite(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function _getUsers()          { return _authRead(AUTH_USERS_KEY) || []; }
function _setSession(user)    { _authWrite(AUTH_SESSION_KEY, user); }
function _validEmail(e)       { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim()); }

/* ── Redirect if already logged in ── */
(function checkSession() {
  const session = _authRead(AUTH_SESSION_KEY);
  if (session && session.id) {
    if (session.role === 'admin') { window.location.replace('admin.html'); return; }
    if (session.role === 'owner') { window.location.replace('owner.html'); return; }
    window.location.replace('index.html');
  }
})();

/* ── Error helpers ── */
function _setError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function _clearErrors() {
  ['reg-err-name', 'reg-err-email', 'reg-err-password', 'reg-err-confirm']
    .forEach(id => _setError(id, ''));
}

/* ── Toast ── */
function showToast(msg, type) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className   = 'toast ' + (type || 'success') + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}

/* ── Password eye toggle ── */
function togglePasswordVis(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const show = inp.type === 'password';
  inp.type      = show ? 'text' : 'password';
  btn.innerHTML = show ? '&#128584;' : '&#128065;';
}

/* ── Register handler ── */
function handleRegister(e) {
  e.preventDefault();
  _clearErrors();

  const name     = (document.getElementById('regName').value     || '').trim();
  const email    = (document.getElementById('regEmail').value    || '').trim().toLowerCase();
  const password = (document.getElementById('regPassword').value || '').trim();
  const confirm  = (document.getElementById('regConfirm').value  || '').trim();

  let valid = true;
  if (!name)                        { _setError('reg-err-name',     'Name is required.');                          valid = false; }
  if (!email)                       { _setError('reg-err-email',    'Email is required.');                         valid = false; }
  else if (!_validEmail(email))     { _setError('reg-err-email',    'Enter a valid email address.');               valid = false; }
  if (!password)                    { _setError('reg-err-password', 'Password is required.');                      valid = false; }
  else if (password.length < 6)    { _setError('reg-err-password', 'Password must be at least 6 characters.');   valid = false; }
  if (!confirm)                     { _setError('reg-err-confirm',  'Please confirm your password.');              valid = false; }
  else if (password !== confirm)    { _setError('reg-err-confirm',  'Passwords do not match.');                    valid = false; }
  if (!valid) return;

  const users = _getUsers();
  if (users.find(u => u.email === email)) {
    _setError('reg-err-email', 'An account with this email already exists.');
    return;
  }

  const newUser = {
    id:        'u_' + Date.now(),
    name,
    email,
    password,
    role:      'customer',
    createdAt: new Date().toISOString(),
  };
  users.push(newUser);
  _authWrite(AUTH_USERS_KEY, users);

  const sessionUser = { id: newUser.id, name: newUser.name, email: newUser.email, role: 'customer' };
  _setSession(sessionUser);

  showToast('Account created! Welcome, ' + newUser.name + '!', 'success');
  setTimeout(() => { window.location.href = 'index.html'; }, 900);
}
</script>

</body>
</html>
