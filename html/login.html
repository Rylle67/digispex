<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* ── Auth page shell ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg);
    }

    .auth-page-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 2rem;
      cursor: pointer;
      text-decoration: none;
    }

    .auth-page-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }

    .auth-page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 2.5px;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .auth-page-sub {
      font-size: 0.82rem;
      color: var(--text3);
      margin-bottom: 1.75rem;
    }

    .auth-page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--text3);
    }

    .auth-page-footer a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .auth-page-footer a:hover { opacity: 0.8; }

    .auth-back-link {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text3);
    }
    .auth-back-link a {
      color: var(--text2);
      text-decoration: none;
    }
    .auth-back-link a:hover { color: var(--accent); }
  </style>
</head>
<body>

<script src="../javascript/theme.js"></script>

<div class="auth-page">

  <a class="auth-page-logo" href="index.html">DigiSpecs</a>

  <div class="auth-page-card">
    <div class="auth-page-title">Sign In</div>
    <div class="auth-page-sub">Welcome back — sign in to your account</div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <div class="auth-form-group">
        <label class="auth-label">Email Address</label>
        <input class="form-input" id="loginEmail" type="email"
               placeholder="you@example.com" autocomplete="email">
        <span class="auth-error" id="login-err-email"></span>
      </div>

      <div class="auth-form-group">
        <label class="auth-label">Password</label>
        <div class="auth-input-wrap">
          <input class="form-input" id="loginPassword" type="password"
                 placeholder="Your password" autocomplete="current-password">
          <button type="button" class="auth-eye-btn"
                  onclick="togglePasswordVis('loginPassword', this)">&#128065;</button>
        </div>
        <span class="auth-error" id="login-err-password"></span>
      </div>

      <span class="auth-error auth-error-general" id="login-err-general"></span>

      <button type="submit" class="btn-primary auth-submit-btn">Sign In</button>
    </form>

    <div class="auth-page-footer">
      Don't have an account?
      <a href="register.html">Create one</a>
    </div>

    <div class="auth-back-link">
      <a href="index.html">&larr; Back to store</a>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ── Storage keys (must match auth-modal.js) ── */
const AUTH_USERS_KEY   = 'ds_auth_users';
const AUTH_SESSION_KEY = 'ds_auth_session';

function _authRead(key)       { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function _authWrite(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function _getUsers()          { return _authRead(AUTH_USERS_KEY) || []; }
function _setSession(user)    { _authWrite(AUTH_SESSION_KEY, user); }
function _validEmail(e)       { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim()); }

/* ── Seed built-in accounts (mirrors auth-modal.js) ── */
(function _seed() {
  const users = _getUsers();
  const seeded = [
    { id:'builtin_admin', name:'DigiSpecs Admin', email:'admin@digispecs.ph', password:'admin123', role:'admin',  createdAt:'2025-01-01T00:00:00.000Z' },
    { id:'builtin_owner', name:'DigiSpecs Owner', email:'owner@digispecs.ph', password:'owner123', role:'owner',  createdAt:'2025-01-01T00:00:00.000Z' },
  ];
  let changed = false;
  seeded.forEach(s => { if (!users.find(u => u.id === s.id)) { users.push(s); changed = true; } });
  if (changed) _authWrite(AUTH_USERS_KEY, users);
})();

/* ── Redirect helper ── */
function _redirectByRole(role) {
  if (role === 'admin') { window.location.replace('admin.html');  return; }
  if (role === 'owner') { window.location.replace('owner.html');  return; }
  window.location.replace('index.html');
}

/* ── Redirect if already logged in ── */
(function checkSession() {
  const session = _authRead(AUTH_SESSION_KEY);
  if (session && session.id) _redirectByRole(session.role);
})();

/* ── Error helpers ── */
function _setError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function _clearErrors() {
  ['login-err-email', 'login-err-password', 'login-err-general']
    .forEach(id => _setError(id, ''));
}

/* ── Toast ── */
function showToast(msg, type) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className   = 'toast ' + (type || 'success') + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}

/* ── Password eye toggle ── */
function togglePasswordVis(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const show = inp.type === 'password';
  inp.type      = show ? 'text' : 'password';
  btn.innerHTML = show ? '&#128584;' : '&#128065;';
}

/* ── Login handler ── */
function handleLogin(e) {
  e.preventDefault();
  _clearErrors();

  const email    = (document.getElementById('loginEmail').value    || '').trim().toLowerCase();
  const password = (document.getElementById('loginPassword').value || '').trim();

  let valid = true;
  if (!email)                   { _setError('login-err-email',    'Email is required.');              valid = false; }
  else if (!_validEmail(email)) { _setError('login-err-email',    'Enter a valid email address.');    valid = false; }
  if (!password)                { _setError('login-err-password', 'Password is required.');           valid = false; }
  if (!valid) return;

  const users = _getUsers();
  const found = users.find(u => u.email === email && u.password === password);
  if (!found) {
    _setError('login-err-general', 'Incorrect email or password.');
    return;
  }

  const sessionUser = { id: found.id, name: found.name, email: found.email, role: found.role || 'customer' };
  _setSession(sessionUser);

  showToast('Welcome back, ' + found.name + '!', 'success');
  setTimeout(() => _redirectByRole(sessionUser.role), 700);
}
</script>

</body>
</html>
