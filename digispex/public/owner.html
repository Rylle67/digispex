<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiSpex — Owner Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
  <script>
    /* ── Owner-only guard ── */
    (function() {
      try {
        const s = DS_API.auth.getSession();
        if (!s || s.role !== 'owner') window.location.replace('/login');
      } catch { window.location.replace('/login'); }
    })();
  </script>
  <style>
    /* ═══════════════════════════════════════
       Owner Dashboard — scoped styles
    ═══════════════════════════════════════ */

    .owner-hero {
      background: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(0,212,255,0.07) 100%);
      border-bottom: 1px solid var(--border2);
      padding: 2.25rem 2rem 1.5rem;
      margin-bottom: 2rem;
    }
    .owner-hero-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .owner-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--text);
    }
    .owner-title span { color: #a78bfa; }
    .owner-sub {
      font-size: 0.8rem;
      color: var(--text3);
      margin-top: 0.2rem;
    }
    .range-pills { display: flex; gap: 0.4rem; }
    .range-pill {
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--border2);
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text3);
      transition: all .15s;
    }
    .range-pill:hover   { border-color: #a78bfa; color: #a78bfa; }
    .range-pill.active  { background: #7c3aed; border-color: #7c3aed; color: #fff; }

    /* ── Body wrap ── */
    .owner-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── KPI row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1.2rem 1.2rem 1rem;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--kc, var(--accent));
      border-radius: 14px 14px 0 0;
    }
    .kpi-lbl  { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 0.55rem; }
    .kpi-val  { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--kc, var(--accent)); line-height: 1; }
    .kpi-sub  { font-size: 0.7rem; color: var(--text3); margin-top: 0.3rem; }

    /* ── Section header ── */
    .sec-hdr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 0.9rem;
    }

    /* ── Status breakdown bar ── */
    .status-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.7rem;
      margin-bottom: 2rem;
    }
    .status-chip {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .status-info .s-name  { font-size: 0.68rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--text3); }
    .status-info .s-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--text); }

    /* ── Charts area ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    @media(max-width:720px){ .charts-grid { grid-template-columns: 1fr; } }
    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 1.2rem;
    }
    .chart-box-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    /* ── Top products table ── */
    .top-tbl-wrap {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .top-tbl { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .top-tbl th {
      padding: .65rem 1rem;
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text3);
      border-bottom: 1px solid var(--border2);
      background: var(--bg);
    }
    .top-tbl td { padding: .72rem 1rem; border-bottom: 1px solid var(--border); color: var(--text); }
    .top-tbl tr:last-child td { border-bottom: none; }
    .rank { display:inline-flex; width:22px; height:22px; align-items:center; justify-content:center; border-radius:50%; font-size:.68rem; font-weight:700; background:var(--bg); color:var(--text3); }
    .rank.gold   { background:rgba(251,191,36,.2); color:#fbbf24; }
    .rank.silver { background:rgba(156,163,175,.2); color:#9ca3af; }
    .rank.bronze { background:rgba(180,83,9,.2);   color:#b45309; }

    /* ── Orders table ── */
    .orders-wrap {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .orders-toolbar {
      padding: .85rem 1.2rem;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .orders-search {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: .42rem .8rem;
      font-size: .82rem;
      color: var(--text);
      width: 210px;
      outline: none;
    }
    .orders-search:focus { border-color: #a78bfa; }
    .orders-tbl { width:100%; border-collapse:collapse; font-size:.82rem; }
    .orders-tbl thead th {
      padding:.6rem 1rem;
      text-align:left;
      font-size:.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      color:var(--text3); border-bottom:1px solid var(--border2); background:var(--bg);
    }
    .orders-tbl tbody td { padding:.75rem 1rem; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle; }
    .orders-tbl tbody tr:last-child td { border-bottom:none; }
    .orders-tbl tbody tr:hover { background:rgba(255,255,255,.02); }
    .oid  { font-family:'JetBrains Mono',monospace; font-size:.76rem; color:#a78bfa; }
    .ocust { font-weight:500; }
    .oemail { font-size:.71rem; color:var(--text3); }
    .ototal { font-family:'JetBrains Mono',monospace; font-weight:700; color:#22c55e; }
    .odate  { font-size:.72rem; color:var(--text3); }
    .ostatus {
      display:inline-block; padding:.18rem .6rem; border-radius:20px;
      font-size:.68rem; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    }
    .ostatus.pending     { background:rgba(245,158,11,.15); color:#f59e0b; }
    .ostatus.processing  { background:rgba(59,130,246,.15);  color:#3b82f6; }
    .ostatus.shipped     { background:rgba(139,92,246,.15);  color:#8b5cf6; }
    .ostatus.out_delivery{ background:rgba(0,212,255,.15);   color:#00d4ff; }
    .ostatus.delivered   { background:rgba(34,197,94,.15);   color:#22c55e; }
    .ostatus.cancelled   { background:rgba(239,68,68,.15);   color:#ef4444; }
    .ostatus.confirmed   { background:rgba(34,197,94,.15);   color:#22c55e; }
    .empty-row td { text-align:center; color:var(--text3); padding:2.5rem; }
  </style>
<script>
/* Clean URL — remove filename, show domain only */
(function() {
  try {
    if (window.location.pathname !== '/' && window.location.pathname !== '') {
      history.replaceState(null, '', window.location.origin + '/');
    }
  } catch(e) {}
})();
</script>
</head>
<body>

<!-- ── Nav ── -->
<nav>
  <div class="nav-logo">DigiSpex</div>
  <span class="nav-badge" style="background:rgba(124,58,237,.15);color:#a78bfa;border-color:rgba(124,58,237,.4);">Owner Dashboard</span>
  <div class="nav-right">
    <button class="btn-nav" onclick="location.href='/'">&#8592; View Store</button>
    <button class="btn-nav" onclick="doLogout()" style="color:var(--text3)">Log Out</button>
  </div>
</nav>

<!-- ── Hero ── -->
<div class="owner-hero">
  <div class="owner-hero-inner">
    <div>
      <div class="owner-title">Sales <span>Overview</span></div>
      <div class="owner-sub" id="ownerSub">Loading…</div>
    </div>
    <div class="range-pills">
      <button class="range-pill active" onclick="setRange(7,this)">7 days</button>
      <button class="range-pill"        onclick="setRange(30,this)">30 days</button>
      <button class="range-pill"        onclick="setRange(90,this)">90 days</button>
      <button class="range-pill"        onclick="setRange(0,this)">All time</button>
    </div>
  </div>
</div>

<!-- ── Dashboard body ── -->
<div class="owner-wrap">

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Status breakdown -->
  <div class="sec-hdr">Order Status Breakdown</div>
  <div class="status-row" id="statusRow"></div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-box">
      <div class="chart-box-title">Daily Revenue (₱)</div>
      <canvas id="chartRevenue" height="170"></canvas>
    </div>
    <div class="chart-box">
      <div class="chart-box-title">Orders by Status</div>
      <canvas id="chartStatus" height="170"></canvas>
    </div>
  </div>

  <!-- Top products -->
  <div class="sec-hdr">Top Products by Revenue</div>
  <div class="top-tbl-wrap">
    <table class="top-tbl">
      <thead><tr><th>#</th><th>Product</th><th>Units Sold</th><th>Revenue (₱)</th></tr></thead>
      <tbody id="topTbody"></tbody>
    </table>
  </div>

  <!-- Recent orders -->
  <div class="sec-hdr">All Orders</div>
  <div class="orders-wrap">
    <div class="orders-toolbar">
      <span style="font-size:.78rem;color:var(--text3)" id="ordersCount">—</span>
      <input class="orders-search" type="text" id="ordersSearch"
             placeholder="Search order / customer…" oninput="filterOrders()">
    </div>
    <div style="overflow-x:auto">
      <table class="orders-tbl">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Items</th>
            <th>Total (₱)</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="ordersTbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /owner-wrap -->

<div class="toast" id="toast"></div>

<!-- Chart.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════
   DigiSpex — owner.html   (pure localStorage, no backend)
   Read-only sales view for the Owner role.
════════════════════════════════════════════════════════ */
'use strict';

/* ── Auth ── */
/* SESSION is loaded async via DS_API.auth.loadSession() */
let SESSION = null;
// Updated in DOMContentLoaded

async function doLogout() {
  await DS_API.auth.logout();
  window.location.href = '/login';
}

/* ── helpers ── */
const PHP_RATE = 57;
function peso(usd) { return '₱' + Math.round((usd || 0) * PHP_RATE).toLocaleString('en-PH'); }
function num(v)    { return Number(v || 0).toLocaleString(); }
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'info') + ' show';
  setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── Collect ALL orders from localStorage ──────────────
   Orders are stored per-user as: ds_u_<userId>_orders
   and also possibly as: ds_guest_orders
   _getAllOrders() mirrors the logic in admin.js so we get
   the same data the admin sees.
─────────────────────────────────────────────────────── */
async function _getAllOrders() {
  try {
    const orders = await DS_API.orders.getAll();
    return orders.sort((a, b) => new Date(b.date) - new Date(a.date));
  } catch(e) { return []; }
}

/* ── State ── */
let _rangeDays = 7;
let _allOrders = [];
let _chartRev  = null;
let _chartSt   = null;

/* ── Range filter ── */
function setRange(days, btn) {
  document.querySelectorAll('.range-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _rangeDays = days;
  renderDashboard();
}

function _inRange(order) {
  if (_rangeDays === 0) return true;
  const d = new Date(order.date || order.createdAt || 0);
  return (Date.now() - d.getTime()) <= _rangeDays * 86400000;
}

/* ── Main render ── */
async function renderDashboard() {
  _allOrders = await _getAllOrders();
  const orders = _allOrders.filter(_inRange);
  const active = orders.filter(o => o.status !== 'cancelled');

  /* ── KPIs ── */
  const revenue   = active.reduce((s, o) => s + (o.total || 0), 0);
  const nProducts = (() => {
    const custom = typeof _customProductsCache !== 'undefined' ? _customProductsCache : [];
    const base   = typeof PRODUCTS !== 'undefined' ? PRODUCTS.length : 0;
    return base + custom.length;
  })();
  const nCustomers = (() => {
    // Count from _allOrders unique users (no admin API call needed for owner)
    const uids = new Set(_allOrders.map(o => o.userUid).filter(Boolean));
    return uids.size;
  })();

  const kpis = [
    { lbl:'Total Revenue',  val: peso(revenue),                sub:'excl. cancelled',       c:'#22c55e' },
    { lbl:'Orders',         val: num(orders.length),           sub:'in selected period',    c:'#00d4ff' },
    { lbl:'Delivered',      val: num(orders.filter(o=>o.status==='delivered').length), sub:'completed', c:'#22c55e' },
    { lbl:'Pending',        val: num(orders.filter(o=>o.status==='pending'||!o.status).length), sub:'awaiting action', c:'#f59e0b' },
    { lbl:'Cancelled',      val: num(orders.filter(o=>o.status==='cancelled').length), sub:'lost orders', c:'#ef4444' },
    { lbl:'Customers',      val: num(nCustomers),              sub:'registered accounts',   c:'#8b5cf6' },
    { lbl:'Products',       val: num(nProducts),               sub:'in catalogue',          c:'#3b82f6' },
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    `<div class="kpi-card" style="--kc:${k.c}">
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`
  ).join('');

  /* ── Status breakdown ── */
  const statusDefs = [
    { key:'pending',      lbl:'Pending',      c:'#f59e0b' },
    { key:'confirmed',    lbl:'Confirmed',    c:'#22c55e' },
    { key:'processing',   lbl:'Processing',   c:'#3b82f6' },
    { key:'shipped',      lbl:'Shipped',      c:'#8b5cf6' },
    { key:'out_delivery', lbl:'Out Delivery', c:'#00d4ff' },
    { key:'delivered',    lbl:'Delivered',    c:'#22c55e' },
    { key:'cancelled',    lbl:'Cancelled',    c:'#ef4444' },
  ];
  const statusCount = {};
  orders.forEach(o => {
    const k = o.status || 'pending';
    statusCount[k] = (statusCount[k] || 0) + 1;
  });
  document.getElementById('statusRow').innerHTML = statusDefs.map(s =>
    `<div class="status-chip">
      <div class="status-dot" style="background:${s.c}"></div>
      <div class="status-info">
        <div class="s-name">${s.lbl}</div>
        <div class="s-count">${num(statusCount[s.key] || 0)}</div>
      </div>
    </div>`
  ).join('');

  /* ── Daily revenue chart ── */
  const dayMap = {};
  orders.filter(o => o.status !== 'cancelled').forEach(o => {
    const d = (o.date || o.createdAt || '').slice(0, 10);
    if (!d) return;
    dayMap[d] = (dayMap[d] || 0) + (o.total || 0);
  });
  const sortedDays = Object.keys(dayMap).sort();
  const revLabels  = sortedDays;
  const revData    = sortedDays.map(d => Math.round(dayMap[d] * PHP_RATE));

  if (_chartRev) {
    _chartRev.data.labels = revLabels;
    _chartRev.data.datasets[0].data = revData;
    _chartRev.update();
  } else {
    _chartRev = new Chart(document.getElementById('chartRevenue').getContext('2d'), {
      type: 'line',
      data: {
        labels: revLabels,
        datasets: [{
          label: 'Revenue (₱)', data: revData,
          borderColor: '#7c3aed', backgroundColor: 'rgba(124,58,237,.12)',
          tension: 0.35, fill: true, pointRadius: 3, pointBackgroundColor: '#7c3aed',
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color:'#6b7280', font:{size:10} }, grid:{color:'rgba(255,255,255,.04)'} },
          y: { ticks: { color:'#6b7280', font:{size:10}, callback: v=>'₱'+v.toLocaleString() }, grid:{color:'rgba(255,255,255,.04)'} },
        }
      }
    });
  }

  /* ── Status donut chart ── */
  const stLabels = statusDefs.map(s => s.lbl);
  const stData   = statusDefs.map(s => statusCount[s.key] || 0);
  const stColors = statusDefs.map(s => s.c);

  if (_chartSt) {
    _chartSt.data.datasets[0].data = stData;
    _chartSt.update();
  } else {
    _chartSt = new Chart(document.getElementById('chartStatus').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: stLabels,
        datasets: [{ data: stData, backgroundColor: stColors.map(c=>c+'99'), borderColor: stColors, borderWidth:1.5 }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position:'right', labels:{ color:'#9ca3af', font:{size:11}, boxWidth:12, padding:10 } }
        }
      }
    });
  }

  /* ── Top products ── */
  const tally = {};
  active.forEach(o => {
    (o.items || []).forEach(item => {
      const n = item.name || item.productId || '?';
      if (!tally[n]) tally[n] = { name:n, qty:0, rev:0 };
      tally[n].qty += item.qty || 1;
      tally[n].rev += (item.price || 0) * (item.qty || 1);
    });
  });
  const topProds = Object.values(tally).sort((a,b)=>b.rev-a.rev).slice(0,10);
  const rankClass = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';
  document.getElementById('topTbody').innerHTML = topProds.length
    ? topProds.map((p,i) =>
        `<tr>
          <td><span class="rank ${rankClass(i)}">${i+1}</span></td>
          <td>${p.name}</td>
          <td>${num(p.qty)}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#22c55e">${peso(p.rev)}</td>
        </tr>`
      ).join('')
    : `<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:2rem">No sales data yet</td></tr>`;

  /* ── Orders table ── */
  document.getElementById('ordersCount').textContent = num(_allOrders.length) + ' total orders';
  _renderOrderRows(orders);
}

function _renderOrderRows(orders) {
  const tbody = document.getElementById('ordersTbody');
  if (!orders.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No orders found.</td></tr>';
    return;
  }
  tbody.innerHTML = orders.slice(0, 150).map(o => {
    const items    = o.items || [];
    const preview  = items.slice(0,2).map(i => (i.name||i.productId||'?') + (i.qty>1?' ×'+i.qty:'')).join(', ')
                   + (items.length>2 ? ' +' + (items.length-2) + ' more' : '');
    const customer = o.customer || o.userId || '—';
    const st       = o.status || 'pending';
    const date     = (o.date || o.createdAt || '').slice(0,16).replace('T',' ');
    return `<tr>
      <td><div class="oid">${o.id || '—'}</div></td>
      <td><div class="ocust">${customer}</div></td>
      <td style="max-width:200px;font-size:.78rem;color:var(--text2)">${preview || '—'}</td>
      <td class="ototal">${peso(o.total)}</td>
      <td><span class="ostatus ${st}">${st}</span></td>
      <td class="odate">${date || '—'}</td>
    </tr>`;
  }).join('');
}

function filterOrders() {
  const q = (document.getElementById('ordersSearch').value || '').toLowerCase();
  if (!q) { _renderOrderRows(_allOrders.filter(_inRange)); return; }
  const filtered = _allOrders.filter(_inRange).filter(o =>
    (o.id||'').toLowerCase().includes(q) ||
    (o.customer||'').toLowerCase().includes(q) ||
    (o.userId||'').toLowerCase().includes(q)
  );
  _renderOrderRows(filtered);
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', renderDashboard);
</script>

<script>
document.addEventListener('DOMContentLoaded', async function() {
  await DS_API.auth.loadSession();
  SESSION = DS_API.auth.getSession();
  const sub = document.getElementById('ownerSub');
  if (sub) sub.textContent = 'Welcome, ' + (SESSION?.name || 'Owner') + ' — read-only view';
  // Load custom products for product count
  _customProductsCache = await DS_API.admin.getProducts().catch(() => []);
  await renderDashboard();
});
</script>
